<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аккаунт</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header>
    <nav class="nav">
        <div class="logo">CS2 Academy PRO</div>
        <ul class="nav-links">
            <li><a href="/">Главная</a></li>
            <li><a href="/training">Тренировки</a></li>
            <li><a href="/maps">Карты</a></li>
            <li><a href="/progress">Прогресс</a></li>
            <li><a href="/auth" class="active">Аккаунт</a></li>
        </ul>
    </nav>
</header>

<div class="container">
    <section class="hero fade-in">
        <h1>🔐 Аккаунт</h1>
        <p>Регистрация и вход</p>
    </section>

    <div class="two-column">
        <div class="profile-box fade-in">
            <h3>Регистрация</h3>
            <input class="profile-input" id="registerUsername" placeholder="Логин (англ. буквы, цифры, _ .)">
            <input class="profile-input" id="registerPassword" type="password" placeholder="Пароль (мин. 8 символов)">
            <button class="btn" onclick="registerAccount()">Зарегистрироваться</button>
        </div>

        <div class="profile-box fade-in">
            <h3>Вход</h3>
            <input class="profile-input" id="loginUsername" placeholder="Логин">
            <input class="profile-input" id="loginPassword" type="password" placeholder="Пароль">
            <button class="btn" onclick="loginAccount()">Войти</button>
            <button class="btn" onclick="logoutAccount()">Выйти</button>
        </div>
    </div>

    <div class="info-box fade-in">
        <h3>Статус</h3>
        <p id="authStatus">Проверка...</p>
        <p class="small-text">
            Логин: 3–20 символов, только английские буквы, цифры, _ и .<br>
            Пароль: минимум 8 символов, хотя бы 1 буква и 1 цифра.
        </p>
    </div>
</div>

<footer>CS2 Academy PRO</footer>

<script src="{{ url_for('static', filename='config.js') }}"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
